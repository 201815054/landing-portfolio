<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css");
  *{margin:0;box-sizing:border-box;font-family:"Pretendard Variable",sans-serif;word-break:keep-all}
  html,body{width:1200px;height:900px;overflow:hidden}
  .cover{width:1200px;height:900px;background:radial-gradient(900px 500px at 80% -5%,#6366f1,transparent 60%),linear-gradient(135deg,#0b1020,#1b1340);color:#fff;padding:78px 76px;display:flex;flex-direction:column;justify-content:center;position:relative}
  .badge{display:inline-block;font-size:24px;font-weight:700;letter-spacing:.02em;color:#c7d2fe;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;margin-bottom:30px;width:fit-content}
  h1{font-size:84px;line-height:1.12;font-weight:800;letter-spacing:-.03em}
  h1 b{color:#a5b4fc}
  .sub{margin-top:26px;font-size:33px;color:#cdd3e6;font-weight:500;line-height:1.5}
  .row{margin-top:46px;display:flex;gap:16px;flex-wrap:wrap}
  .pill{font-size:25px;font-weight:700;background:#fff;color:#1b1340;padding:14px 26px;border-radius:14px}
  .pill.line{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.3)}
  .mini{position:absolute;right:-40px;bottom:-30px;display:flex;gap:18px;transform:rotate(-6deg)}
  .card{width:230px;height:300px;border-radius:18px;background:#fff;box-shadow:0 30px 60px rgba(0,0,0,.4);overflow:hidden}
  .card .bar{height:46px;display:flex;align-items:center;padding:0 16px;color:#fff;font-weight:800;font-size:15px}
  .card .b{height:14px;margin:14px 16px;border-radius:7px;background:#eceaf6}
  .card .b.big{height:26px;width:60%;background:#dcd8f3}
  .card .btn{height:34px;margin:18px 16px;border-radius:9px}
</style>
</head>
<body>
  <div class="cover">
    <span class="badge">디자인 + 개발, 한 사람이</span>
    <h1>광고비가 아깝지 않은<br /><b>전환형 랜딩페이지</b> 제작</h1>
    <div class="sub">예쁨이 아니라 결과. 문의·예약·구매까지 설계 · 보통 3~5일 납품</div>
    <div class="row">
      <span class="pill">반응형 일괄제작</span>
      <span class="pill line">폼·예약·연동</span>
      <span class="pill line">애널리틱스 세팅</span>
    </div>
    <div class="mini">
      <div class="card"><div class="bar" style="background:#0d9488">CLINIC</div><div class="b big"></div><div class="b"></div><div class="b" style="width:70%"></div><div class="btn" style="background:#0d9488"></div></div>
      <div class="card"><div class="bar" style="background:#ea580c">ACADEMY</div><div class="b big"></div><div class="b"></div><div class="b" style="width:70%"></div><div class="btn" style="background:#ea580c"></div></div>
      <div class="card"><div class="bar" style="background:#4f46e5">SAAS</div><div class="b big"></div><div class="b"></div><div class="b" style="width:70%"></div><div class="btn" style="background:#4f46e5"></div></div>
    </div>
  </div>
</body>
</html>
