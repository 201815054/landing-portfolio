<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css");
  *{margin:0;box-sizing:border-box;font-family:"Pretendard Variable",system-ui,Arial,sans-serif}
  html,body{width:1280px;height:769px;overflow:hidden}
  .cover{width:1280px;height:769px;background:radial-gradient(900px 460px at 82% -8%,#6366f1,transparent 60%),linear-gradient(135deg,#0b1020,#1b1340);color:#fff;padding:62px 68px;display:flex;flex-direction:column;justify-content:center;position:relative}
  .badge{display:inline-block;font-size:21px;font-weight:700;letter-spacing:.02em;color:#c7d2fe;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:11px 20px;border-radius:999px;margin-bottom:26px;width:fit-content}
  h1{font-size:70px;line-height:1.1;font-weight:800;letter-spacing:-.03em;max-width:840px}
  h1 b{color:#a5b4fc}
  .sub{margin-top:24px;font-size:28px;color:#cdd3e6;font-weight:500;line-height:1.45;max-width:760px}
  .row{margin-top:40px;display:flex;gap:14px;flex-wrap:wrap}
  .pill{font-size:22px;font-weight:700;background:#fff;color:#1b1340;padding:13px 24px;border-radius:13px}
  .pill.line{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.3)}
  .mini{position:absolute;right:-30px;bottom:-26px;display:flex;gap:16px;transform:rotate(-6deg)}
  .card{width:210px;height:270px;border-radius:16px;background:#fff;box-shadow:0 26px 54px rgba(0,0,0,.4);overflow:hidden}
  .card .bar{height:42px;display:flex;align-items:center;padding:0 15px;color:#fff;font-weight:800;font-size:14px}
  .card .b{height:13px;margin:13px 15px;border-radius:7px;background:#eceaf6}
  .card .b.big{height:24px;width:60%;background:#dcd8f3}
  .card .btn{height:32px;margin:16px 15px;border-radius:9px}
</style>
</head>
<body>
  <div class="cover">
    <span class="badge">Designer + Developer in one</span>
    <h1>High-converting<br /><b>landing pages</b>, designed &amp; coded.</h1>
    <div class="sub">Not just pretty — built to convert. Bookings, signups, sales · 3–5 day delivery.</div>
    <div class="row">
      <span class="pill">Responsive build</span>
      <span class="pill line">Forms &amp; analytics</span>
      <span class="pill line">Conversion-focused</span>
    </div>
    <div class="mini">
      <div class="card"><div class="bar" style="background:#4f46e5">SAAS</div><div class="b big"></div><div class="b"></div><div class="b" style="width:70%"></div><div class="btn" style="background:#4f46e5"></div></div>
      <div class="card"><div class="bar" style="background:#0d9488">DENTAL</div><div class="b big"></div><div class="b"></div><div class="b" style="width:70%"></div><div class="btn" style="background:#0d9488"></div></div>
      <div class="card"><div class="bar" style="background:#db2777">COACH</div><div class="b big"></div><div class="b"></div><div class="b" style="width:70%"></div><div class="btn" style="background:#db2777"></div></div>
    </div>
  </div>
</body>
</html>
